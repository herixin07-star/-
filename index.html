<style>
:root{--ink:#1B2A4A;--navy:#203864;--blue:#4472C4;--blue2:#5B9BD5;--teal:#2BAE9E;--success:#2E933C;--amber:#E8A33D;--danger:#D64545;--grey:#8C9BAB;--greyL:#C9CDD4;--bg:#EEF1F6;--card:#FFFFFF;--line:#E3E7EE;--txt:#1F2937;--muted:#6B7280;}
*{box-sizing:border-box}
body{margin:0;font-family:"微软雅黑","Microsoft YaHei","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:13px}
header{background:linear-gradient(100deg,var(--ink),#2C4470);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;box-shadow:0 2px 10px rgba(0,0,0,.12)}
header h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.5px}
header .sub{font-size:11px;opacity:.8;margin-top:2px}
.spacer{flex:1}
.btn{background:#fff;color:var(--ink);border:none;border-radius:8px;padding:9px 16px;font-weight:700;cursor:pointer;font-size:13px;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:.15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.2)}
.btn.ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35)}
.btn.sm{padding:7px 13px;font-size:12px}
.filters{display:flex;gap:14px;align-items:center;flex-wrap:wrap;padding:12px 22px;background:#fff;border-bottom:1px solid var(--line)}
.filters label{font-size:12px;color:var(--muted);font-weight:700;margin-right:5px}
.filters select{padding:7px 10px;border:1px solid var(--greyL);border-radius:7px;font-size:13px;background:#FAFBFD;font-family:inherit;color:var(--ink);font-weight:600;cursor:pointer}
.filters .fg{display:flex;align-items:center}
nav.tabs{display:flex;gap:4px;padding:0 18px;background:#fff;border-bottom:2px solid var(--line);overflow-x:auto}
nav.tabs button{background:none;border:none;padding:12px 15px;font-size:13.5px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;font-family:inherit}
nav.tabs button.active{color:var(--ink);border-bottom-color:var(--blue)}
nav.tabs button:hover{color:var(--ink)}
main{padding:20px 22px 60px;max-width:1320px;margin:0 auto}
.grid{display:grid;gap:16px}
.cols-5{grid-template-columns:repeat(5,1fr)}.cols-4{grid-template-columns:repeat(4,1fr)}.cols-2{grid-template-columns:1fr 1fr}.cols-3{grid-template-columns:repeat(3,1fr)}
.col-7-5{grid-template-columns:1.45fr 1fr}
@media(max-width:900px){.cols-5,.cols-4,.cols-3,.col-7-5,.cols-2{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(20,40,80,.05)}
.card h3{margin:0 0 12px;font-size:14px;color:var(--ink);font-weight:800;display:flex;align-items:center;gap:7px}
.card h3 .bar{width:4px;height:15px;background:var(--blue);border-radius:2px;display:inline-block}
.chartbox{width:100%}.chartbox svg{width:100%;height:100%;display:block}svg{display:block}
.kpi{padding:14px 16px;border-radius:12px;color:#fff;position:relative;overflow:hidden;min-height:88px}
.kpi .lab{font-size:12px;opacity:.92;font-weight:700}.kpi .val{font-size:24px;font-weight:800;margin-top:8px;letter-spacing:.4px}.kpi .sub{font-size:11px;opacity:.85;margin-top:3px}
.pbar{height:9px;background:rgba(255,255,255,.28);border-radius:6px;margin-top:9px;overflow:hidden}.pbar>i{display:block;height:100%;background:#fff;border-radius:6px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:var(--navy);color:#fff;padding:8px 9px;text-align:center;font-weight:700;position:sticky;top:0;z-index:20}
.cell-bar .track{z-index:0}
th.sortable{cursor:pointer;user-select:none}th.sortable:hover{background:#2c4d82}
td{padding:7px 9px;border-bottom:1px solid var(--line);text-align:center}
tbody tr:hover{background:#F5F8FE}
td.l,th.l{text-align:left}td.r{text-align:right}
.tot{background:#3B3838;color:#fff;font-weight:800}.tot td{color:#fff;border:none}
.cell-bar{position:relative;display:flex;align-items:center;justify-content:flex-end;gap:6px;min-width:90px}
.cell-bar .track{position:absolute;left:0;top:50%;transform:translateY(-50%);height:62%;border-radius:4px}
.cell-bar span{position:relative;font-weight:700;z-index:1;font-size:12px}
.pos{color:var(--success);font-weight:700}.neg{color:var(--danger);font-weight:700}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:800;color:#fff}
.quadwrap{display:grid;grid-template-columns:18px 1fr 1fr;grid-template-rows:1fr 1fr 18px;gap:8px;min-height:330px}
.quad{border-radius:12px;padding:14px 16px;border:2px solid;display:flex;flex-direction:column}
.quad .qh{font-weight:800;font-size:14px;display:flex;justify-content:space-between;align-items:center}
.quad .qd{font-size:11px;color:var(--muted);margin:2px 0 8px}
.quad .qlist{display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start}
.quad .chip{background:#fff;border:1px solid rgba(0,0,0,.08);padding:4px 11px;border-radius:18px;font-weight:700;font-size:12.5px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.qcount{font-size:12px;background:rgba(0,0,0,.06);padding:1px 9px;border-radius:12px}
.axlab{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;font-weight:700}
.thresh{display:flex;gap:18px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.thresh input{width:64px;padding:5px 7px;border:1px solid var(--amber);background:#FFF8E8;border-radius:6px;font-weight:700;color:var(--ink);text-align:center;font-family:inherit}
.insight{border-left:4px solid var(--teal);background:#F3FBFA;border-radius:8px;padding:11px 14px;margin-bottom:10px}
.insight .p{font-size:11px;font-weight:800;color:#fff;padding:1px 8px;border-radius:10px;display:inline-block;margin-bottom:5px}
.insight b{color:var(--ink)}
.docline{display:flex;align-items:center;gap:8px;font-size:11.5px;padding:3px 0 3px 8px;border-left:2px solid #e3e7ee;margin-left:4px}
.act{padding:11px 0;border-bottom:1px solid var(--line)}
.act .pr{font-weight:800;font-size:12px;padding:3px 9px;border-radius:8px;margin-right:8px}
.note{font-size:11px;color:var(--muted);margin-top:6px}
.imp-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:8px;font-size:12px}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px}
.prodbar{display:flex;height:18px;border-radius:4px;overflow:hidden;min-width:140px;border:1px solid #eef1f6}
.prodbar>div{display:flex;align-items:center;justify-content:center;color:#fff;font-size:9.5px;font-weight:700}
.modalbg{position:fixed;inset:0;background:rgba(20,30,50,.45);display:flex;align-items:center;justify-content:center;z-index:60}
.modalbox{background:#fff;border-radius:14px;padding:20px 22px;max-width:640px;width:92%;max-height:82vh;overflow:auto;box-shadow:0 12px 44px rgba(0,0,0,.32)}
.modalbox h3{margin:0 0 12px;color:var(--ink);display:flex;justify-content:space-between;align-items:center}
.modalbox .x{cursor:pointer;color:var(--muted);font-weight:800;font-size:18px;border:none;background:none}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.3);opacity:0;transition:.3s;pointer-events:none;z-index:99}
#toast.show{opacity:1}

document.getElementById('file').addEventListener('change',function(e){const f=e.target.files[0];if(!f)return;readFile(f,(headers,recs)=>{const low=headers.map(h=>String(h||'').trim().toLowerCase());const im={month:findCol(low,['年月','year/month','月份']),brand:findCol(low,['brand name','品牌','brand']),hosp:findCol(low,['buyer name','医院','客户']),prov:findCol(low,['buyer province','省份','province']),rep:findCol(low,['代表 name','代表','rep']),qty:findCol(low,['sales qty','销量']),tg:findCol(low,['target amt','月指标','target'])};im.cy=low.findIndex(h=>h.startsWith('sales amt')||h==='本年达成');im.ly=low.findIndex(h=>h.startsWith('ly sales')||h==='去年同期');if([im.month,im.brand,im.hosp,im.cy].some(i=>i<0)){toast('未识别销售表头');return;}const out=[];for(const r of recs){const m=r[im.month];if(m==null||m==='')continue;let b=r[im.brand];b=BMAP[b]||b;out.push([parseInt(m)||m,b,r[im.hosp],im.prov>=0?r[im.prov]:'',im.rep>=0?r[im.rep]:'',num(r[im.ly]),num(r[im.cy]),num(r[im.qty]),num(r[im.tg])]);}if(!out.length){toast('未读取到数据行');return;}RAW=out;state.month='全部';state.prod='全部';state.prov='全部';buildFilters();render();toast('已导入 '+out.length.toLocaleString()+' 条销售数据 ✓');});e.target.value='';});

document.getElementById('fileDoc').addEventListener('change',function(e){const f=e.target.files[0];if(!f)return;readFile(f,(headers,recs)=>{const low=headers.map(h=>String(h||'').trim().toLowerCase());const im={hosp:findCol(low,['医院']),dept:findCol(low,['科室']),code:findCol(low,['医生代号','医生','代号']),title:findCol(low,['职称']),prod:findCol(low,['主推产品','主推','产品']),grade:findCol(low,['等级','级别']),pot:findCol(low,['月潜力盒','月潜力','潜力']),cur:findCol(low,['当前月处方盒','当前月处方','当前'])};if([im.hosp,im.code].some(i=>i<0)){toast('未识别医生表头（需含 医院/医生代号）');return;}const out=[];for(const r of recs){if(r[im.code]==null||r[im.code]==='')continue;out.push([r[im.hosp],im.dept>=0?r[im.dept]:'',r[im.code],im.title>=0?r[im.title]:'',im.prod>=0?r[im.prod]:'',im.grade>=0?String(r[im.grade]).trim().toUpperCase():'B',im.pot>=0?num(r[im.pot]):0,(im.cur>=0&&String(r[im.cur]).trim()!=='')?num(r[im.cur]):'']);}if(!out.length){toast('未读取到医生数据');return;}DOCS=out;render();toast('已导入 '+out.length+' 位医生 ✓');});e.target.value='';});
function loadXLSX(cb){if(window.XLSX)return cb();const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=cb;s.onerror=()=>toast('无法联网加载 Excel 解析库，请改用 CSV 导入');document.head.appendChild(s);}
function resetData(){RAW=RAW_SEED.map(r=>r.slice());INVEST=INV_SEED.map(r=>r.slice());DOCS=DOC_SEED.map(r=>r.slice());state.showFee=false;resetFilters();toast('已恢复示例数据');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
buildFilters();buildTabs();render();
